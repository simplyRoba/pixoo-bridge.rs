name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v5
        with:
          # release-type and changelog sections are configured via
          # release-please-config.json + .release-please-manifest.json
          # (auto-detected by release-please-action@v5).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        id: release
