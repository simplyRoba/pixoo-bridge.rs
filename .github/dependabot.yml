version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "fix(deps): "
    groups:
      tokio:
        patterns:
          - "tokio"
          - "tokio-test"
      serde:
        patterns:
          - "serde"
          - "serde_json"
      tracing:
        patterns:
          - "tracing"
          - "tracing-subscriber"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "fix(ci): "
